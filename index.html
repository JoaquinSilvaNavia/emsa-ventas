<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSA — Ventas & Producción</title>
<!--
  EMSA — Dashboard Ventas & Producción
  Fuente: Google Sheets <- emsa_sync_ventas.py <- INET SQL Server
  Vista SQL: INFORMAT_Vista_LibroProductosVenta_ESPECIAL
  Sheet: 1NppGV5go7xHYgEPUOERpljT9bvKdgaRkDbKyM41YaHY
  Mapeo:
    GASEOSA + BEB.REFRES.               -> Gaseosas
    A.PURIFICADA (>=6L)                 -> Bidones
    A.PURIFICADA (<6L) + A.MINERAL      -> Agua Purificada
    A.SABORIZADA                        -> Aguas Saborizadas
    ISOTONICA                           -> Isotónica
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #0d0f14; --bg2: #13161e; --bg3: #1a1d27;
  --bdr:  rgba(255,255,255,0.07); --bdr2: rgba(255,255,255,0.13);
  --text: #e8eaf0; --muted: #7a7f94;
  --acc:  #2e74b5; --grn: #1d9e75; --red: #c94a4a; --amb: #d4890f;
  --font: 'DM Sans',system-ui,sans-serif;
  --mono: 'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}

header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100}
.badge{background:var(--acc);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.htitle{font-size:15px;font-weight:500;margin-left:10px}
.hsub{font-size:11px;color:var(--muted);margin-left:10px;margin-top:1px}
.sync-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.top-tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--bdr)}
.top-tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.top-tab:hover{color:var(--text)} .top-tab.on{color:var(--text);border-bottom-color:var(--acc)}

.view-tabs{display:flex;gap:8px;padding:18px 24px 0}
.view-tab{padding:5px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:1px solid var(--bdr2);border-radius:20px;background:none;transition:all .15s}
.view-tab:hover{color:var(--text)} .view-tab.on{color:var(--bg);background:var(--text);border-color:var(--text)}

main{padding:20px 24px 48px;max-width:1060px}

.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.kpi-v{font-size:16px;font-weight:600;font-family:var(--mono);letter-spacing:-.5px}
.kpi-d{font-size:11px;margin-top:3px;font-family:var(--mono)}
.pos{color:var(--grn)} .neg{color:var(--red)} .neu{color:var(--muted)}

.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:20px 22px;margin-bottom:14px}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.ct{font-size:14px;font-weight:500} .cs{font-size:11px;color:var(--muted);margin-top:2px}
.leg{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap}
.ll{width:16px;height:2px;border-radius:1px;flex-shrink:0}
.cw{position:relative;width:100%;height:260px}

.note{background:rgba(212,137,15,.08);border:1px solid rgba(212,137,15,.25);border-radius:8px;padding:9px 13px;font-size:11px;color:var(--amb);margin-bottom:14px;line-height:1.6}

.tbl{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{padding:9px 13px;text-align:right;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.tbl thead th:first-child{text-align:left}
.tbl tbody td{padding:8px 13px;border-bottom:1px solid var(--bdr);color:var(--text);text-align:right;font-family:var(--mono);font-size:11px}
.tbl tbody td:first-child{text-align:left;font-family:var(--font);font-size:12px}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}

.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.cat-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.cat-btn{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);border-radius:20px;background:none;transition:all .15s;color:var(--muted)}
.cat-btn:hover{color:var(--text)}
.cat-btn.on{font-weight:600;border-width:2px}


@media(max-width:700px){
  header,main,.top-tabs,.view-tabs{padding-left:16px;padding-right:16px}
  .kpis{grid-template-columns:1fr 1fr}
  .kpi-v{font-size:14px}
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="badge">EMSA</span>
    <div><span class="htitle">Ventas &amp; Producción</span><div class="hsub">Ventas &amp; Producción por categoría</div></div>
  </div>
  <div class="sync-row"><span class="sync-dot"></span><span id="last-sync">Cargando...</span></div>
</header>

<div class="top-tabs">
  <button class="top-tab on" onclick="setM('ventas',this)">Ventas (M$)</button>
  <button class="top-tab"    onclick="setM('prod',this)">Producción (Litros)</button>
</div>
<div class="view-tabs">
  <button class="view-tab on" onclick="setV('total',this)">Total consolidado</button>
  <button class="view-tab"    onclick="setV('cats',this)">Por categoría</button>
  <button class="view-tab"    onclick="setV('comp',this)">Comparativo anual ↕</button>
</div>

<main id="mc">
  <div class="state-box"><div class="spinner"></div><span>Cargando datos desde Google Sheets...</span></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── CONFIGURACIÓN ─────────────────────────────────────────────
const SHEET_ID = "1NppGV5go7xHYgEPUOERpljT9bvKdgaRkDbKyM41YaHY";
const API_KEY  = "AIzaSyCXaM0fXC-6H-Pz22uRTv52uMe3xtIoLkU";

// ── CATEGORÍAS ────────────────────────────────────────────────
const CATS = [
  { k:"Gaseosas",          c:"#3b8fd4" },
  { k:"Jugos",             c:"#e8a838" },
  { k:"Bidones",           c:"#d4890f" },
  { k:"Agua Purificada",   c:"#1d9e75" },
  { k:"Aguas Saborizadas", c:"#9b6dd4" },
  { k:"Isotónica",         c:"#e05a5a" },
];

const MM = {"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun",
            "07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};

// ── ESTADO ────────────────────────────────────────────────────
let rawV=[], rawP=[], aM="ventas", aV="total", cA=null, cB=null;

// ── UTILS ─────────────────────────────────────────────────────
const num  = v => { var n=Number(String(v??'').trim()); return isNaN(n)?0:n; };
const pct  = (a,b) => b===0?null:(a-b)/b*100;
const sign = v => v>=0?"+":"";
const dc   = v => v===null?"neu":v>0?"pos":v<0?"neg":"neu";
const isV  = () => aM==="ventas";
const fc   = () => isV()?"MONTO_VENTA":"LITROS";
const rows = () => isV()?rawV:rawP;
const mm   = p => String(p).slice(5,7);
const lbl  = p => MM[mm(p)]+"'"+(p.slice(2,4));
const getPeriods = () => [...new Set(rows().map(r=>r.PERIODO))].sort();
const fmtM = v => "M$"+(v/1e6).toLocaleString("es-CL",{minimumFractionDigits:1,maximumFractionDigits:1});
const fmtL = v => Math.round(v/1000).toLocaleString("es-CL")+" kL";
const fmt  = v => isV()?fmtM(v):fmtL(v);
const toC  = v => isV()?Math.round(v/1e4)/100:Math.round(v/1000);

// ── FETCH GOOGLE SHEETS ───────────────────────────────────────
async function fetchSheet(tab) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${tab}!A:AZ?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — pestaña ${tab}`);
  const d = await r.json();
  const rows = d.values || [];
  if (rows.length < 2) return [];
  const h = rows[0];
  return rows.slice(1).map(row => {
    var o = {}; h.forEach((k,i) => o[k] = row[i] ?? ''); return o;
  });
}

// ── PROCESAR DATOS ────────────────────────────────────────────
function byPeriodCat() {
  const m = {};
  rows().forEach(r => {
    if (!m[r.PERIODO]) m[r.PERIODO] = {};
    m[r.PERIODO][r.CATEGORIA] = (m[r.PERIODO][r.CATEGORIA] || 0) + num(r[fc()]);
  });
  return m;
}

// ── KPIs (YTD: meses 2026 vs mismos meses 2025) ───────────────
function kpiHTML() {
  const bpc = byPeriodCat();
  const p26 = getPeriods().filter(p => p.startsWith("2026"));
  const p25 = p26.map(p => "2025-" + p.slice(5));
  return `<div class="kpis">${CATS.map(cat => {
    const v26 = p26.reduce((s,p) => s + (bpc[p]?.[cat.k] || 0), 0);
    const v25 = p25.reduce((s,p) => s + (bpc[p]?.[cat.k] || 0), 0);
    const d   = pct(v26, v25);
    // Si v25=0 no hay base comparable — mostrar solo acumulado 2026
    const hasComp = v25 > 0;
    const deltaHTML = hasComp
      ? `<div class="kpi-d ${dc(d)}">${sign(d)}${d.toFixed(1)}% vs '25</div>`
      : `<div class="kpi-d neu">Acum. 2026</div>`;
    return `<div class="kpi">
      <div class="kpi-l"><span class="cdot" style="background:${cat.c}"></span>${cat.k}</div>
      <div class="kpi-v">${fmt(v26)}</div>
      ${deltaHTML}
    </div>`;
  }).join("")}</div>`;
}

// ── CHART OPTIONS ─────────────────────────────────────────────
function cOpts(unit) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode:"index", intersect:false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor:"#1a1d27", borderColor:"rgba(255,255,255,.1)", borderWidth:1,
        titleColor:"#e8eaf0", bodyColor:"#7a7f94", padding:10,
        callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString("es-CL")} ${unit}` }
      }
    },
    scales: {
      x: { grid:{display:false}, ticks:{color:"#7a7f94",font:{size:11}}, border:{color:"rgba(255,255,255,.07)"} },
      y: { grid:{color:"rgba(255,255,255,.05)"}, border:{display:false},
           ticks:{color:"#7a7f94",font:{size:11},callback:v=>v.toLocaleString("es-CL")} }
    }
  };
}

function killCharts() { if(cA){cA.destroy();cA=null;} if(cB){cB.destroy();cB=null;} }

// ── RENDER TOTAL ──────────────────────────────────────────────
function renderTotal() {
  const periods = getPeriods();
  const bpc = byPeriodCat();
  const unit = isV() ? "M$" : "kL";

  const mos26 = periods.filter(p=>p.startsWith("2026")).map(p=>mm(p));
  const comp = mos26.map(m => ({
    m, label: MM[m],
    v25: CATS.reduce((s,c) => s + (bpc["2025-"+m]?.[c.k]||0), 0),
    v26: CATS.reduce((s,c) => s + (bpc["2026-"+m]?.[c.k]||0), 0)
  }));
  const ytd25 = comp.reduce((s,x)=>s+x.v25,0);
  const ytd26 = comp.reduce((s,x)=>s+x.v26,0);
  const dYTD  = pct(ytd26, ytd25);

  const legH = CATS.map(c=>`<span class="li"><span class="ll" style="background:${c.c}"></span>${c.k}</span>`).join("");

  const tfilas = comp.map(x => {
    const d = pct(x.v26, x.v25);
    return `<tr>
      <td><b>${x.label}</b></td>
      <td>${fmt(x.v25)}</td>
      <td>${fmt(x.v26)}</td>
      <td class="${dc(d)}">${d!==null?sign(d)+d.toFixed(1)+"%":"—"}</td>
    </tr>`;
  }).join("");

  document.getElementById("mc").innerHTML = kpiHTML() +
  `<div class="card">
    <div class="ch">
      <div><div class="ct">Serie completa por categoría</div><div class="cs">${isV()?"Ventas Neto_Afecto (M$)":"Producción (miles de litros)"} · línea mensual</div></div>
      <div class="leg">${legH}</div>
    </div>
    <div class="cw" style="height:280px"><canvas id="cA"></canvas></div>
  </div>
  <div class="card">
    <div class="ch">
      <div><div class="ct">Comparativo YTD — mismo período año anterior</div><div class="cs">Barras 2025 vs 2026</div></div>
      <span style="font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:20px;background:${dYTD!==null&&dYTD>=0?"rgba(29,158,117,.15)":"rgba(201,74,74,.12)"};color:${dYTD!==null&&dYTD>=0?"var(--grn)":"var(--red)"}">${dYTD!==null?sign(dYTD)+dYTD.toFixed(1)+"%":"—"} YTD</span>
    </div>
    <div class="cw" style="height:210px"><canvas id="cComp"></canvas></div>
  </div>
  <div class="tbl"><table>
    <thead><tr><th>Mes</th><th>2025</th><th>2026</th><th>Variación</th></tr></thead>
    <tbody>${tfilas}</tbody>
  </table></div>`;

  killCharts();

  cA = new Chart(document.getElementById("cA"), {
    type: "line",
    data: {
      labels: periods.map(lbl),
      datasets: CATS.map(cat => ({
        label: cat.k,
        data: periods.map(p => toC(bpc[p]?.[cat.k]||0)),
        borderColor: cat.c, backgroundColor: cat.c+"15",
        borderWidth:2.5, pointRadius:3, pointHoverRadius:6,
        pointBackgroundColor:cat.c, tension:.35, fill:false
      }))
    },
    options: cOpts(unit)
  });

  cB = new Chart(document.getElementById("cComp"), {
    type: "bar",
    data: {
      labels: comp.map(x=>x.label),
      datasets: [
        { label:"2025", data:comp.map(x=>toC(x.v25)), backgroundColor:"rgba(255,255,255,.18)", borderRadius:4, barPercentage:.5, categoryPercentage:.7 },
        { label:"2026", data:comp.map(x=>toC(x.v26)), backgroundColor:"#3b8fd4", borderRadius:4, barPercentage:.5, categoryPercentage:.7 }
      ]
    },
    options: { ...cOpts(unit),
      plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#1a1d27",borderColor:"rgba(255,255,255,.1)",borderWidth:1,titleColor:"#e8eaf0",bodyColor:"#7a7f94",padding:10,
        callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString("es-CL")} ${unit}`}}}
    }
  });
}

// ── RENDER CATEGORÍAS ─────────────────────────────────────────
function renderCats() {
  const periods = getPeriods();
  const bpc = byPeriodCat();
  const unit = isV() ? "M$" : "kL";
  const legH = CATS.map(c=>`<span class="li"><span class="ll" style="background:${c.c}"></span>${c.k}</span>`).join("");

  const thP = periods.map(p=>`<th>${lbl(p)}</th>`).join("");
  const tfilas = CATS.map(cat => {
    const celdas = periods.map(p=>`<td>${fmt(bpc[p]?.[cat.k]||0)}</td>`).join("");
    return `<tr><td><span class="cdot" style="background:${cat.c}"></span>${cat.k}</td>${celdas}</tr>`;
  }).join("");

  document.getElementById("mc").innerHTML =
  `<div class="card">
    <div class="ch">
      <div><div class="ct">Evolución por categoría — serie completa</div><div class="cs">${isV()?"M$ Neto_Afecto":"Miles de litros"} · línea mensual por categoría</div></div>
      <div class="leg">${legH}</div>
    </div>
    <div class="cw" style="height:300px"><canvas id="cB"></canvas></div>
  </div>
  <div class="tbl" style="overflow-x:auto"><table>
    <thead><tr><th>Categoría</th>${thP}</tr></thead>
    <tbody>${tfilas}</tbody>
  </table></div>`;

  killCharts();
  cB = new Chart(document.getElementById("cB"), {
    type: "line",
    data: {
      labels: periods.map(lbl),
      datasets: CATS.map(cat => ({
        label: cat.k,
        data: periods.map(p => toC(bpc[p]?.[cat.k]||0)),
        borderColor:cat.c, backgroundColor:cat.c+"15",
        borderWidth:2.5, pointRadius:4, pointHoverRadius:7,
        pointBackgroundColor:cat.c, tension:.35, fill:false
      }))
    },
    options: cOpts(unit)
  });
}

// ── NAVEGACIÓN ────────────────────────────────────────────────
function render() { if(aV==="total") renderTotal(); else if(aV==="cats") renderCats(); else renderComp(); }
function setM(m,b){ aM=m; document.querySelectorAll(".top-tab").forEach(x=>x.classList.remove("on")); b.classList.add("on"); render(); }
function setV(v,b){ aV=v; document.querySelectorAll(".view-tab").forEach(x=>x.classList.remove("on")); b.classList.add("on"); render(); }


// ── RENDER COMPARATIVO ANUAL ──────────────────────────────────
let selCat = "Gaseosas";

function renderComp() {
  const bpc = byPeriodCat();
  const unit = isV() ? "M$" : "kL";

  // Meses disponibles en cualquier año
  const allMeses = [...new Set(
    Object.keys(bpc).map(p => mm(p))
  )].sort();

  // Datos por mes para cada año
  const years = [...new Set(Object.keys(bpc).map(p => p.slice(0,4)))].sort();

  // Selector de categoría
  const selHTML = CATS.map(c =>
    `<button class="cat-btn${c.k===selCat?" on":""}" 
      style="${c.k===selCat?"color:"+c.c+";border-color:"+c.c:""}
      onclick="selCat='${c.k}';renderComp()">${c.k}</button>`
  ).join("");

  // Datasets: una barra por año
  const yearColors = { "2025":"rgba(255,255,255,.2)", "2026":"#3b8fd4" };
  const datasets = years.map(yr => ({
    label: yr,
    data: allMeses.map(m => {
      const p = yr+"-"+m;
      return toC(bpc[p]?.[selCat] || 0);
    }),
    backgroundColor: yearColors[yr] || "#9b6dd4",
    borderRadius: 5,
    barPercentage: .55,
    categoryPercentage: .7
  }));

  // Variación mes a mes (2026 vs 2025)
  const varRow = allMeses.map(m => {
    const v26 = bpc["2026-"+m]?.[selCat] || 0;
    const v25 = bpc["2025-"+m]?.[selCat] || 0;
    const d = pct(v26, v25);
    return d !== null
      ? `<td class="${dc(d)}">${sign(d)}${d.toFixed(1)}%</td>`
      : `<td class="neu">—</td>`;
  }).join("");

  // Fila de valores por año
  const dataRows = years.map(yr => {
    const celdas = allMeses.map(m => {
      const v = bpc[yr+"-"+m]?.[selCat] || 0;
      return `<td>${fmt(v)}</td>`;
    }).join("");
    return `<tr><td><b>${yr}</b></td>${celdas}</tr>`;
  }).join("");

  // Totales YTD (meses comunes 2025 y 2026)
  const mos26 = [...new Set(Object.keys(bpc).filter(p=>p.startsWith("2026")).map(p=>mm(p)))];
  const ytd26 = mos26.reduce((s,m) => s+(bpc["2026-"+m]?.[selCat]||0), 0);
  const ytd25 = mos26.reduce((s,m) => s+(bpc["2025-"+m]?.[selCat]||0), 0);
  const dYTD  = pct(ytd26, ytd25);

  const cat = CATS.find(c=>c.k===selCat);
  const thMeses = allMeses.map(m=>`<th>${MM[m]}</th>`).join("");

  document.getElementById("mc").innerHTML =
  `<div class="cat-sel">${selHTML}</div>
  <div class="kpis" style="grid-template-columns:repeat(3,minmax(0,1fr))">
    <div class="kpi">
      <div class="kpi-l">YTD 2026</div>
      <div class="kpi-v">${fmt(ytd26)}</div>
      <div class="kpi-d ${dc(dYTD)}">${dYTD!==null?sign(dYTD)+dYTD.toFixed(1)+"% vs 2025":"—"}</div>
    </div>
    <div class="kpi">
      <div class="kpi-l">YTD 2025</div>
      <div class="kpi-v">${fmt(ytd25)}</div>
      <div class="kpi-d neu">mismo período</div>
    </div>
    <div class="kpi">
      <div class="kpi-l">Mejor mes 2026</div>
      ${(()=>{
        const best = allMeses.reduce((b,m)=>{
          const v=bpc["2026-"+m]?.[selCat]||0; return v>b.v?{m,v}:b;
        },{m:null,v:-Infinity});
        return `<div class="kpi-v">${best.m?MM[best.m]:"—"}</div><div class="kpi-d neu">${best.v>0?fmt(best.v):"—"}</div>`;
      })()}
    </div>
  </div>
  <div class="card">
    <div class="ch">
      <div>
        <div class="ct" style="color:${cat.c}">${selCat} — 2025 vs 2026</div>
        <div class="cs">Barras por mes · ${isV()?"Ventas M$":"Litros"} · comparativo año anterior</div>
      </div>
      <div class="leg">
        <span class="li"><span class="ll" style="background:rgba(255,255,255,.2)"></span>2025</span>
        <span class="li"><span class="ll" style="background:#3b8fd4"></span>2026</span>
      </div>
    </div>
    <div class="cw" style="height:280px"><canvas id="cComp2"></canvas></div>
  </div>
  <div class="tbl" style="overflow-x:auto"><table>
    <thead><tr><th>Año</th>${thMeses}</tr></thead>
    <tbody>
      ${dataRows}
      <tr style="border-top:1px solid var(--bdr2)">
        <td style="color:var(--muted);font-size:11px">Var.</td>${varRow}
      </tr>
    </tbody>
  </table></div>`;

  killCharts();
  cA = new Chart(document.getElementById("cComp2"), {
    type: "bar",
    data: { labels: allMeses.map(m=>MM[m]), datasets },
    options: {
      ...cOpts(unit),
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:"#1a1d27",borderColor:"rgba(255,255,255,.1)",borderWidth:1,
          titleColor:"#e8eaf0",bodyColor:"#7a7f94",padding:10,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString("es-CL")} ${unit}` }
        }
      }
    }
  });
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    [rawV, rawP] = await Promise.all([
      fetchSheet("ventas"),
      fetchSheet("produccion")
    ]);

    // Timestamp último sync
    try {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/meta!A1?key=${API_KEY}`);
      const d = await r.json();
      const v = d.values?.[0]?.[0];
      document.getElementById("last-sync").textContent = v ? "Sync: " + v : "Sin datos de sync";
    } catch(e) {
      document.getElementById("last-sync").textContent = "Sin datos de sync";
    }

    if (!rawV.length && !rawP.length) {
      document.getElementById("mc").innerHTML =
        `<div class="state-box"><span>El Sheet está vacío.</span><span style="font-size:12px">Ejecutar: py emsa_sync_ventas.py --once</span></div>`;
      return;
    }

    render();
  } catch(e) {
    document.getElementById("mc").innerHTML =
      `<div class="state-box">
        <span style="color:var(--red)">Error al cargar datos</span>
        <span style="font-size:12px">${e.message}</span>
        <span style="font-size:11px;color:var(--muted)">Verificar que el Sheet está compartido con el service account</span>
      </div>`;
    document.getElementById("last-sync").textContent = "Error";
  }
}

init();
</script>
</body>
</html>
